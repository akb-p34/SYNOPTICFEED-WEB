<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin dashboard &mdash; SynopticFeed</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="icon" type="image/png" href="assets/favicon.png">
    <style>
        :root {
            --bg: #000000;
            --surface: #0c0c0c;
            --surface-alt: rgba(255, 120, 0, 0.08);
            --border: rgba(255, 255, 255, 0.12);
            --text: #FFFFFF;
            --text-dim: rgba(255, 255, 255, 0.72);
            --text-faint: rgba(255, 255, 255, 0.45);
            --accent: #FF7800;
            --accent-glow: rgba(255, 120, 0, 0.18);
            --danger: #ef4444;
            --good: #22c55e;
            --warn: #fbbf24;
            --ease: cubic-bezier(0.22, 0.61, 0.36, 1);
        }
        html, body {
            background: var(--bg);
            margin: 0;
            padding: 0;
            color: var(--text);
            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            line-height: 1.5;
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(8px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .wrap {
            max-width: 1180px;
            margin: 0 auto;
            padding: 32px 24px 96px;
        }
        header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin: 0 0 40px;
            padding: 0 0 20px;
            border-bottom: 1px solid var(--border);
        }
        header a.brand {
            text-decoration: none;
            color: var(--text);
            letter-spacing: 0.04em;
            font-weight: 600;
        }
        header a.brand:hover { color: var(--accent); }
        header .meta {
            font-size: 13px;
            color: var(--text-faint);
            letter-spacing: 0.06em;
            text-transform: uppercase;
        }
        h1 {
            font-family: "Times New Roman", Times, serif;
            font-size: 40px;
            font-weight: normal;
            letter-spacing: -0.01em;
            margin: 0 0 4px;
        }
        h2 {
            font-family: "Times New Roman", Times, serif;
            font-size: 22px;
            font-weight: normal;
            letter-spacing: -0.005em;
            margin: 36px 0 14px;
            color: var(--text);
        }

        .kpis {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 14px;
            margin: 20px 0 8px;
        }
        .kpi {
            border: 1px solid var(--border);
            border-radius: 12px;
            background: var(--surface);
            padding: 18px 20px;
            animation: fadeUp 260ms var(--ease) both;
        }
        .kpi .label {
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.09em;
            color: var(--text-faint);
            text-transform: uppercase;
            margin: 0 0 6px;
        }
        .kpi .value {
            font-family: "Times New Roman", Times, serif;
            font-size: 36px;
            font-weight: normal;
            color: var(--text);
        }
        .kpi .value.accent { color: var(--accent); }
        .kpi .value.danger { color: var(--danger); }

        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        @media (max-width: 780px) {
            .grid-2 { grid-template-columns: 1fr; }
            h1 { font-size: 32px; }
        }

        .card {
            border: 1px solid var(--border);
            border-radius: 12px;
            background: var(--surface);
            padding: 20px 22px;
            animation: fadeUp 260ms var(--ease) both;
        }
        .card h3 {
            font-family: "Times New Roman", Times, serif;
            font-weight: normal;
            font-size: 18px;
            margin: 0 0 14px;
            color: var(--text);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }
        th, td {
            text-align: left;
            padding: 10px 8px;
            border-bottom: 1px solid var(--border);
            color: var(--text);
        }
        th {
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.08em;
            color: var(--text-faint);
            text-transform: uppercase;
        }
        td.dim { color: var(--text-dim); }
        td.mono {
            font-family: "SF Mono", Menlo, Consolas, monospace;
            font-size: 12px;
            color: var(--text-dim);
        }
        .pill {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 999px;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.04em;
        }
        .pill.good { background: rgba(34,197,94,0.14); color: var(--good); }
        .pill.warn { background: rgba(251,191,36,0.14); color: var(--warn); }
        .pill.danger { background: rgba(239,68,68,0.14); color: var(--danger); }
        .pill.tier-s { background: var(--accent); color: #000; }
        .pill.tier-a { background: rgba(255,120,0,0.18); color: var(--accent); }

        .chart-box {
            position: relative;
            height: 240px;
        }
        .chart-box.tall { height: 380px; }
        .empty {
            color: var(--text-faint);
            font-style: italic;
            padding: 12px 0;
        }

        #login {
            max-width: 420px;
            margin: 120px auto 0;
            padding: 32px;
            border: 1px solid var(--border);
            border-radius: 12px;
            background: var(--surface);
            animation: fadeUp 260ms var(--ease) both;
        }
        #login h1 {
            font-size: 28px;
            margin: 0 0 8px;
        }
        #login p { color: var(--text-dim); margin: 0 0 20px; }
        #login input {
            width: 100%;
            box-sizing: border-box;
            padding: 14px 16px;
            font-family: "SF Mono", Menlo, Consolas, monospace;
            font-size: 14px;
            background: var(--bg);
            color: var(--text);
            border: 2px solid var(--border);
            border-radius: 10px;
            outline: none;
            margin: 0 0 14px;
        }
        #login input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }
        #login button {
            width: 100%;
            padding: 14px 20px;
            background: var(--accent);
            color: #000;
            border: 2px solid var(--accent);
            border-radius: 10px;
            font-family: inherit;
            font-size: 15px;
            font-weight: 600;
            letter-spacing: 0.04em;
            cursor: pointer;
            text-transform: uppercase;
        }
        #login button:hover {
            background: transparent;
            color: var(--accent);
        }
        #login .error {
            color: var(--danger);
            font-size: 13px;
            min-height: 18px;
            margin: -4px 0 14px;
        }

        #dashboard { display: none; }
        #dashboard.visible { display: block; }
    </style>
</head>
<body>
    <div class="wrap">
        <div id="login">
            <h1>Admin access</h1>
            <p>Enter the admin password to continue.</p>
            <input id="pw" type="password" autocomplete="off" placeholder="password">
            <p class="error" id="login-error"></p>
            <button id="login-btn">Enter</button>
        </div>

        <div id="dashboard">
            <header>
                <a href="/" class="brand">SYNOPTICFEED</a>
                <span class="meta" id="refresh-meta">Loading&hellip;</span>
            </header>

            <h1>Admin dashboard</h1>
            <p style="color: var(--text-dim); margin: 0 0 24px;">Last 30 days.</p>

            <div class="kpis" id="kpis"></div>

            <div class="grid-2" style="margin-top: 28px;">
                <div class="card">
                    <h3>Unique visitors / day</h3>
                    <div class="chart-box"><canvas id="chart-visitors"></canvas></div>
                </div>
                <div class="card">
                    <h3>Top pages</h3>
                    <div class="chart-box"><canvas id="chart-pages"></canvas></div>
                </div>
            </div>

            <div class="grid-2" style="margin-top: 20px;">
                <div class="card">
                    <h3>Top CTAs clicked</h3>
                    <div class="chart-box tall"><canvas id="chart-ctas"></canvas></div>
                </div>
                <div class="card">
                    <h3>Speed (P75 latency)</h3>
                    <div id="vitals-table"></div>
                </div>
            </div>

            <h2>Recent leads</h2>
            <div class="card"><div id="leads-table"></div></div>

            <h2>Top CRM contacts (Tier S + A)</h2>
            <div class="card"><div id="contacts-table"></div></div>

            <h2>Errors (most recent 20)</h2>
            <div class="card"><div id="errors-table"></div></div>
        </div>
    </div>

    <script src="/assets/vendor/chart-4.4.6.umd.min.js" integrity="sha384-Sse/HDqcypGpyTDpvZOJNnG0TT3feGQUkF9H+mnRvic+LjR+K1NhTt8f51KIQ3v3" crossorigin="anonymous"></script>
    <script src="admin.js" defer></script>
</body>
</html>
